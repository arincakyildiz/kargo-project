<div class="layout">
  <aside
    class="sidebar"
    [class.sidebar--expanded]="sidebarGenisletildi()"
    (mouseenter)="sidebarGenisletildi.set(true)"
    (mouseleave)="sidebarGenisletildi.set(false)"
  >
    <div class="sidebar__brand">
      <img src="assets/logo.jpg" alt="Logo" class="sidebar__logo" />
      <span>{{ 'brand_name' | translate }}</span>
      <button
        type="button"
        class="hamburger-btn"
        aria-label="Menüyü aç"
        [attr.aria-expanded]="mobilMenuAcik()"
        (click)="mobilMenuDegistir($event)"
      >
        <app-icon [name]="mobilMenuAcik() ? 'kapat' : 'menu'" [size]="20"></app-icon>
      </button>
    </div>
    <nav class="sidebar__nav">
      <a
        *ngFor="let item of navItems()"
        [routerLink]="item.yol"
        routerLinkActive="active"
        class="sidebar__link"
      >
        <app-icon [name]="item.ikon" [size]="17"></app-icon>
        <span>{{ item.etiket | translate }}</span>
      </a>
    </nav>
    <nav class="mobil-menu" *ngIf="mobilMenuAcik()" (click)="$event.stopPropagation()">
      <a
        *ngFor="let item of navItems()"
        [routerLink]="item.yol"
        routerLinkActive="active"
        class="mobil-menu__link"
        (click)="mobilMenuAcik.set(false)"
      >
        <app-icon [name]="item.ikon" [size]="18"></app-icon>
        <span>{{ item.etiket | translate }}</span>
      </a>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar__left">
        <div class="dropdown-wrap">
          <button
            type="button"
            class="btn btn--ghost btn--sm"
            (click)="veriMenusuDegistir($event)"
          >
            <app-icon name="paket" [size]="14"></app-icon>
            <span>{{ 'data_management' | translate }}</span>
          </button>
          <div class="dropdown dropdown--demo" *ngIf="veriMenusuAcik()" (click)="$event.stopPropagation()">
            <button
              type="button"
              class="dropdown-item-btn"
              (click)="ornekVeriYukleAction()"
            >
              <app-icon name="paket" [size]="14" class="dropdown-item-btn__icon--primary"></app-icon>
              {{ 'load_demo_data' | translate }}
            </button>
            <button
              type="button"
              class="dropdown-item-btn dropdown-item-btn--danger"
              *ngIf="veriVarMi()"
              (click)="verileriSilAction()"
            >
              <app-icon name="iade" [size]="14"></app-icon>
              {{ 'delete_all_data' | translate }}
            </button>
            <button
              type="button"
              class="dropdown-item-btn"
              (click)="hataSimuleEt()"
            >
              <app-icon name="saat" [size]="14"></app-icon>
              {{ 'simulate_error' | translate }}
            </button>
          </div>
        </div>
      </div>

      <div class="topbar__actions">
        <button
          type="button"
          class="icon-btn"
          [attr.aria-label]="theme.tema() === 'dark' ? 'Aydınlık moda geç' : 'Karanlık moda geç'"
          (click)="theme.degistir()"
        >
          <app-icon [name]="theme.tema() === 'dark' ? 'gunes' : 'ay'" [size]="17"></app-icon>
        </button>

        <button type="button" class="icon-btn" aria-label="Bildirimler" (click)="bildirimAc($event)">
          <app-icon name="bildirim" [size]="17"></app-icon>
          <span class="icon-btn__badge" *ngIf="okunmamisBildirimSayisi()">{{ okunmamisBildirimSayisi() }}</span>
        </button>

        <div class="topbar__divider"></div>

        <div class="topbar__role">
          <label for="rolSelect">{{ 'active_role' | translate }}</label>
          <select id="rolSelect" (change)="rolDegistir($any($event.target).value)">
            <option *ngFor="let r of roller" [value]="r" [selected]="r === currentUser.rol()">{{ r | translate }}</option>
          </select>
        </div>

        <div class="topbar__role">
          <label for="langSelect">{{ 'language' | translate }}</label>
          <select id="langSelect" [value]="langService.currentLang()" (change)="langService.setLanguage($any($event.target).value)">
            <option value="tr">TR</option>
            <option value="en">EN</option>
          </select>
        </div>

        <div class="dropdown-wrap">
          <button type="button" class="avatar-btn" (click)="profilAc($event)">
            <span class="avatar-btn__circle"><app-icon name="kullanici" [size]="16"></app-icon></span>
            <span class="avatar-btn__info">
              <span class="avatar-btn__name">{{ currentUser.kullanici().adSoyad }}</span>
              <span class="avatar-btn__role">{{ currentUser.rol() | translate }}</span>
            </span>
          </button>
          <div class="dropdown dropdown--profile" *ngIf="profilAcik()" (click)="$event.stopPropagation()">
            <div class="dropdown__profile-name">{{ currentUser.kullanici().adSoyad }}</div>
            <div class="dropdown__profile-role">{{ currentUser.rol() | translate }}</div>
          </div>
        </div>
      </div>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<div class="notification-overlay" *ngIf="bildirimAcik()" (click)="bildirimAcik.set(false)">
  <div class="notification-modal" (click)="$event.stopPropagation()">
    <div class="notification-modal__header">
      <h3>{{ 'latest_actions' | translate }}</h3>
      <button
        type="button"
        class="link-btn"
        *ngIf="gosterilenBildirimler().length"
        (click)="tumunuOkunduIsaretle()"
      >
        {{ 'mark_all_read' | translate }}
      </button>
    </div>
    <div class="dropdown__empty" *ngIf="!gosterilenBildirimler().length">{{ 'no_actions' | translate }}</div>
    <a
      *ngFor="let b of gosterilenBildirimler()"
      routerLink="/audit-log"
      class="dropdown__item"
      [class.dropdown__item--unread]="bildirimOkunmamis(b.id)"
      (click)="bildirimAcik.set(false)"
    >
      <div class="dropdown__item-row">
        <div class="dropdown__item-main">
          <span class="dropdown__item-title dropdown__item-title--wrap">{{ b.aciklama }}</span>
          <span class="dropdown__item-meta">{{ b.islemZamani | tarih }}</span>
        </div>
        <span class="dropdown__item-dot" *ngIf="bildirimOkunmamis(b.id)"></span>
      </div>
    </a>
  </div>
</div>

<app-toast-container></app-toast-container>
<app-confirm-dialog></app-confirm-dialog>
