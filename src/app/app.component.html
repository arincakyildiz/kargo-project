<div class="layout">
  <aside
    class="sidebar"
    [class.sidebar--expanded]="sidebarGenisletildi()"
    (mouseenter)="sidebarGenisletildi.set(true)"
    (mouseleave)="sidebarGenisletildi.set(false)"
  >
    <div class="sidebar__brand">
      <app-icon name="kurye" [size]="22"></app-icon>
      <span>Kargo Operasyon</span>
    </div>
    <nav class="sidebar__nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.yol"
        routerLinkActive="active"
        class="sidebar__link"
      >
        <app-icon [name]="item.ikon" [size]="17"></app-icon>
        <span>{{ item.etiket }}</span>
      </a>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar__user">
        <label for="rolSelect">Aktif Rol</label>
        <select id="rolSelect" [value]="currentUser.rol()" (change)="rolDegistir($any($event.target).value)">
          <option *ngFor="let r of roller" [value]="r">{{ rolEtiketleri[r] }}</option>
        </select>
        <span class="topbar__user-name">{{ currentUser.kullanici().adSoyad }}</span>
      </div>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<app-toast-container></app-toast-container>
<app-confirm-dialog></app-confirm-dialog>
