<div class="audit-log">
  <h1>Audit Log</h1>
  <div class="panel">
    <table class="data-table" *ngIf="log().length; else bosState">
      <thead>
        <tr><th>Zaman</th><th>Rol</th><th>İşlem</th><th>Açıklama</th><th>Eski → Yeni</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let e of log()">
          <td>{{ e.islemZamani | tarih }}</td>
          <td>{{ e.rol }}</td>
          <td>{{ e.islemTipi }}</td>
          <td>{{ e.aciklama }}</td>
          <td>
            <ng-container *ngIf="e.eskiDeger || e.yeniDeger">{{ e.eskiDeger || '—' }} → {{ e.yeniDeger || '—' }}</ng-container>
          </td>
        </tr>
      </tbody>
    </table>
    <ng-template #bosState>
      <app-empty-state title="Henüz işlem kaydı yok"></app-empty-state>
    </ng-template>
  </div>
</div>
