<div class="audit-log">
  <div class="toolbar">
    <h1>Audit Log</h1>
  </div>

  <div class="toolbar">
    <input
      type="search"
      placeholder="Açıklamada ara..."
      [debounceMs]="350"
      (appDebounce)="aramaDegisti($event)"
    />
    <select (change)="tipFiltresiDegisti($any($event.target).value)">
      <option value="tumu">Tüm İşlem Tipleri</option>
      <option *ngFor="let tip of islemTipleri()" [value]="tip">{{ tip }}</option>
    </select>
    <select [value]="sayfaBoyu()" (change)="sayfaBoyuDegisti($any($event.target).value)">
      <option *ngFor="let boyut of sayfaBoyuSecenekleri" [value]="boyut">{{ boyut }} / sayfa</option>
    </select>
  </div>

  <div class="panel">
    <table class="data-table" *ngIf="sayfalanmis().length; else bosState">
      <thead>
        <tr><th>Zaman</th><th>Rol</th><th>İşlem</th><th>Açıklama</th><th>Eski → Yeni</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let e of sayfalanmis()">
          <td>{{ e.islemZamani | tarih }}</td>
          <td>{{ e.rol }}</td>
          <td>{{ e.islemTipi }}</td>
          <td>{{ e.aciklama }}</td>
          <td>
            <ng-container *ngIf="e.eskiDeger || e.yeniDeger">{{ e.eskiDeger || '—' }} → {{ e.yeniDeger || '—' }}</ng-container>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="pagination" *ngIf="sayfalanmis().length">
      <span class="pagination__info">Toplam {{ filtrelenmis().length }} kayıt</span>
      <div class="pagination__controls" *ngIf="toplamSayfa() > 1">
        <button class="btn btn--ghost btn--sm" (click)="sayfayaGit(sayfa() - 1)" [disabled]="sayfa() === 1">‹ Önceki</button>
        <span>{{ sayfa() }} / {{ toplamSayfa() }}</span>
        <button class="btn btn--ghost btn--sm" (click)="sayfayaGit(sayfa() + 1)" [disabled]="sayfa() === toplamSayfa()">Sonraki ›</button>
      </div>
    </div>

    <ng-template #bosState>
      <app-empty-state
        title="İşlem kaydı bulunamadı"
        description="Filtreyi değiştirin veya bir işlem yaptıktan sonra tekrar bakın."
      ></app-empty-state>
    </ng-template>
  </div>
</div>
