<div class="returns">
  <div class="toolbar">
    <h1>İadeler</h1>
  </div>

  <div class="toolbar">
    <input
      type="search"
      placeholder="Takip kodu veya neden ara..."
      [debounceMs]="350"
      (appDebounce)="aramaDegisti($event)"
    />
    <select (change)="statusFiltresiDegisti($any($event.target).value)">
      <option value="tumu">Tüm Durumlar</option>
      <option *ngFor="let s of statusSecenekleri" [value]="s[0]">{{ s[1] }}</option>
    </select>
    <select (change)="siralamaDegisti($any($event.target).value)">
      <option value="createdAt-desc">En Yeni</option>
      <option value="createdAt-asc">En Eski</option>
    </select>
    <select [value]="sayfaBoyu()" (change)="sayfaBoyuDegisti($any($event.target).value)">
      <option *ngFor="let boyut of sayfaBoyuSecenekleri" [value]="boyut">{{ boyut }} / sayfa</option>
    </select>
  </div>

  <div class="panel" *ngIf="yukleniyor()">
    <p>Yükleniyor...</p>
  </div>

  <div class="panel panel--error" *ngIf="!yukleniyor() && hataMesaji()">
    <p>{{ hataMesaji() }}</p>
    <button class="btn btn--ghost" (click)="yukle()">Tekrar Dene</button>
  </div>

  <div class="panel" *ngIf="!yukleniyor() && !hataMesaji()">
    <table class="data-table" *ngIf="sayfalanmis().length; else bosState">
      <thead>
        <tr><th>Takip Kodu</th><th>Neden</th><th>Durum</th><th>Oluşturulma</th><th *appYetki="['operasyon-uzmani', 'kurye-sorumlusu']"></th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of sayfalanmis()">
          <td><a [routerLink]="['/gonderiler', r.shipmentId]">{{ takipKodu(r.shipmentId) }}</a></td>
          <td class="cell-truncate" [title]="r.neden">{{ r.neden }}</td>
          <td>{{ statusLabels[r.status] }}</td>
          <td>{{ r.createdAt | tarih }}</td>
          <td class="actions" *appYetki="['operasyon-uzmani', 'kurye-sorumlusu']">
            <ng-container *ngIf="r.status === 'beklemede'">
              <button class="btn btn--success btn--sm" (click)="durumGuncelle(r, 'onaylandi')" [disabled]="islemDevamEdiyor() === r.id">Onayla</button>
              <button class="btn btn--danger btn--sm" (click)="durumGuncelle(r, 'reddedildi')" [disabled]="islemDevamEdiyor() === r.id">Reddet</button>
            </ng-container>
            <button
              *ngIf="r.status === 'onaylandi'"
              class="btn btn--primary btn--sm"
              (click)="durumGuncelle(r, 'tamamlandi')"
              [disabled]="islemDevamEdiyor() === r.id"
            >
              Tamamla
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="pagination" *ngIf="sayfalanmis().length">
      <span class="pagination__info">Toplam {{ siraliListe().length }} kayıt</span>
      <div class="pagination__controls" *ngIf="toplamSayfa() > 1">
        <button class="btn btn--ghost btn--sm" (click)="sayfayaGit(sayfa() - 1)" [disabled]="sayfa() === 1">‹ Önceki</button>
        <span>{{ sayfa() }} / {{ toplamSayfa() }}</span>
        <button class="btn btn--ghost btn--sm" (click)="sayfayaGit(sayfa() + 1)" [disabled]="sayfa() === toplamSayfa()">Sonraki ›</button>
      </div>
    </div>

    <ng-template #bosState>
      <app-empty-state title="İade talebi bulunmuyor"></app-empty-state>
    </ng-template>
  </div>
</div>
