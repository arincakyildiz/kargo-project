<div class="map-simulation-container">
  <div class="map-header">
    <div class="map-title">
      <span class="pulse-indicator"></span>
      <h3>Canlı Operasyon & Rota Simülasyonu</h3>
    </div>
    <span class="map-help">Bölgeleri filtrelemek için harita düğümlerine tıklayın</span>
  </div>

  <div class="map-wrapper">
    <svg viewBox="0 0 700 300" width="100%" height="100%" class="map-svg">
      <!-- Grid Arka Plan Çizgileri -->
      <defs>
        <pattern id="mapGrid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#mapGrid)" />

      <!-- Hub'dan Bölgelere Giden Bağlantı Hatları -->
      <ng-container *ngFor="let node of bolgeDugumleri()">
        <line
          *ngIf="node.aktifMi"
          [attr.x1]="merkezHub.x"
          [attr.y1]="merkezHub.y"
          [attr.x2]="node.x"
          [attr.y2]="node.y"
          [attr.stroke]="seciliBolge === node.id ? node.color : '#94a3b8'"
          [attr.stroke-width]="seciliBolge === node.id ? 2.5 : 1.25"
          [attr.stroke-dasharray]="seciliBolge === node.id ? 'none' : '6,4'"
          [attr.opacity]="seciliBolge === node.id ? 1 : 0.5"
          style="transition: all 0.3s ease;"
        />

        <!-- Aktif dağıtım varsa hareket eden kurye paketi (hub -> bölge) -->
        <circle
          *ngIf="node.aktifMi && node.dagitimdaSayisi > 0"
          r="4.5"
          [attr.fill]="node.color"
          opacity="0.9"
        >
          <animate attributeName="cx" [attr.from]="merkezHub.x" [attr.to]="node.x" dur="3s" repeatCount="indefinite" />
          <animate attributeName="cy" [attr.from]="merkezHub.y" [attr.to]="node.y" dur="3s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
        </circle>
      </ng-container>

      <!-- Bölge içi son teslimat yolları (bölge düğümünden mikro teslimat noktalarına) -->
      <ng-container *ngFor="let path of aktifKuryeYollari()">
        <g *ngFor="let pt of path.points; let i = index">
          <line
            [attr.x1]="path.startX"
            [attr.y1]="path.startY"
            [attr.x2]="pt.x"
            [attr.y2]="pt.y"
            [attr.stroke]="path.color"
            stroke-width="1"
            stroke-dasharray="3,3"
            opacity="0.45"
          />
          <!-- Teslimat noktası -->
          <circle
            [attr.cx]="pt.x"
            [attr.cy]="pt.y"
            r="3"
            [attr.fill]="path.color"
            opacity="0.35"
          />
          <!-- Hareket eden kurye noktası -->
          <circle
            r="3.5"
            [attr.fill]="path.color"
          >
            <animate attributeName="cx" [attr.from]="path.startX" [attr.to]="pt.x" [attr.dur]="(2 + i) + 's'" repeatCount="indefinite" />
            <animate attributeName="cy" [attr.from]="path.startY" [attr.to]="pt.y" [attr.dur]="(2 + i) + 's'" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.4;1;0.4" [attr.dur]="(2 + i) + 's'" repeatCount="indefinite" />
          </circle>
        </g>
      </ng-container>

      <!-- Ana Dağıtım Hub'ı (Merkez) -->
      <g>
        <!-- Hub pulse (glow ring) -->
        <circle
          [attr.cx]="merkezHub.x"
          [attr.cy]="merkezHub.y"
          r="14"
          fill="var(--color-primary)"
          opacity="0.15"
        >
          <animate attributeName="r" values="12;18;12" dur="3s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.2;0.08;0.2" dur="3s" repeatCount="indefinite" />
        </circle>
        <!-- Hub core -->
        <circle
          [attr.cx]="merkezHub.x"
          [attr.cy]="merkezHub.y"
          r="8"
          fill="var(--color-primary-dark)"
        />
        <!-- Hub label -->
        <text
          [attr.x]="merkezHub.x"
          [attr.y]="merkezHub.y - 20"
          text-anchor="middle"
          class="hub-label"
        >
          {{ merkezHub.ad }}
        </text>
      </g>

      <!-- Bölge Düğümleri -->
      <g
        *ngFor="let node of bolgeDugumleri()"
        class="node-group"
        [class.node-group--active]="node.aktifMi"
        [class.node-group--selected]="seciliBolge === node.id"
        (click)="node.aktifMi && dugumSec(node.id)"
      >
        <!-- Geniş tıklama alanı -->
        <circle
          *ngIf="node.aktifMi"
          [attr.cx]="node.x"
          [attr.cy]="node.y"
          r="28"
          fill="transparent"
          style="cursor: pointer;"
        />

        <!-- Seçilmişlik halkası (CSS animasyon yerine SVG animate ile döndürme) -->
        <ng-container *ngIf="seciliBolge === node.id">
          <circle
            [attr.cx]="node.x"
            [attr.cy]="node.y"
            r="18"
            fill="none"
            [attr.stroke]="node.color"
            stroke-width="1.5"
            stroke-dasharray="5,3"
            opacity="0.7"
          >
            <animateTransform
              attributeName="transform"
              type="rotate"
              [attr.from]="'0 ' + node.x + ' ' + node.y"
              [attr.to]="'360 ' + node.x + ' ' + node.y"
              dur="6s"
              repeatCount="indefinite"
            />
          </circle>
        </ng-container>

        <!-- Düğüm hover glow halkası -->
        <circle
          *ngIf="node.aktifMi"
          [attr.cx]="node.x"
          [attr.cy]="node.y"
          r="13"
          fill="none"
          [attr.stroke]="node.color"
          stroke-width="0"
          opacity="0"
          class="node-hover-ring"
        />

        <!-- Ana düğüm dairesi -->
        <circle
          [attr.cx]="node.x"
          [attr.cy]="node.y"
          r="9"
          [attr.fill]="node.aktifMi ? node.color : '#cbd5e1'"
          class="node-circle"
        />

        <!-- Bölge Etiketleri -->
        <text
          [attr.x]="node.x"
          [attr.y]="node.y - 16"
          text-anchor="middle"
          class="node-label"
          [class.node-label--inactive]="!node.aktifMi"
        >
          {{ node.ad }}
        </text>

        <!-- İstatistikler -->
        <text
          [attr.x]="node.x"
          [attr.y]="node.y + 22"
          text-anchor="middle"
          class="node-sub"
          *ngIf="node.aktifMi"
        >
          {{ node.gonderiSayisi }} kargo · {{ node.kuryeSayisi }} kurye
        </text>
        <text
          [attr.x]="node.x"
          [attr.y]="node.y + 22"
          text-anchor="middle"
          class="node-sub node-sub--inactive"
          *ngIf="!node.aktifMi"
        >
          Pasif Bölge
        </text>
      </g>
    </svg>
  </div>
</div>
