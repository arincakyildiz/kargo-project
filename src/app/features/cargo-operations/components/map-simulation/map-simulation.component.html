<div class="map-simulation-container">
  <div class="map-header">
    <div class="map-title">
      <span class="pulse-indicator"></span>
      <h3>Canlı Operasyon & Rota Simülasyonu</h3>
    </div>
    <span class="map-help">Bölgeleri filtrelemek için harita düğümlerine tıklayın</span>
  </div>

  <div class="map-wrapper">
    <svg viewBox="0 0 700 300" width="100%" height="100%" class="map-svg">
      <!-- Grid Arka Plan Çizgileri -->
      <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="var(--color-border)" stroke-width="0.5" opacity="0.3"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)" />

      <!-- Hub'dan Bölgelere Giden Bağlantı Hatları -->
      <ng-container *ngFor="let node of bolgeDugumleri()">
        <line
          *ngIf="node.aktifMi"
          [attr.x1]="merkezHub.x"
          [attr.y1]="merkezHub.y"
          [attr.x2]="node.x"
          [attr.y2]="node.y"
          [attr.stroke]="seciliBolge === node.id ? node.color : 'var(--color-border)'"
          [attr.stroke-width]="seciliBolge === node.id ? 2.5 : 1.25"
          [attr.stroke-dasharray]="seciliBolge === node.id ? 'none' : '4,4'"
          style="transition: stroke 0.3s ease, stroke-width 0.3s ease;"
        />

        <!-- Aktif dağıtım varsa hareket eden kurye paketi (hub -> bölge) -->
        <circle
          *ngIf="node.aktifMi && node.dagitimdaSayisi > 0"
          r="4.5"
          [attr.fill]="node.color"
          class="animated-package"
        >
          <animate attributeName="cx" [attr.from]="merkezHub.x" [attr.to]="node.x" dur="3s" repeatCount="indefinite" />
          <animate attributeName="cy" [attr.from]="merkezHub.y" [attr.to]="node.y" dur="3s" repeatCount="indefinite" />
        </circle>
      </ng-container>

      <!-- Bölge içi son teslimat yolları (bölge düğümünden mikro teslimat noktalarına) -->
      <ng-container *ngFor="let path of aktifKuryeYollari()">
        <g *ngFor="let pt of path.points; let i = index">
          <line
            [attr.x1]="path.startX"
            [attr.y1]="path.startY"
            [attr.x2]="pt.x"
            [attr.y2]="pt.y"
            [attr.stroke]="path.color"
            stroke-width="1"
            stroke-dasharray="2,2"
            opacity="0.6"
          />
          <circle
            [attr.cx]="pt.x"
            [attr.cy]="pt.y"
            r="3"
            fill="var(--color-text)"
            opacity="0.4"
          />
          <!-- Düğümler arası teslimat kurye noktası -->
          <circle
            r="3.5"
            [attr.fill]="path.color"
          >
            <animate attributeName="cx" [attr.from]="path.startX" [attr.to]="pt.x" [attr.dur]="(2 + i) + 's'" repeatCount="indefinite" />
            <animate attributeName="cy" [attr.from]="path.startY" [attr.to]="pt.y" [attr.dur]="(2 + i) + 's'" repeatCount="indefinite" />
          </circle>
        </g>
      </ng-container>

      <!-- Ana Dağıtım Hub'ı (Merkez) -->
      <g class="hub-group">
        <circle
          [attr.cx]="merkezHub.x"
          [attr.cy]="merkezHub.y"
          r="12"
          fill="var(--color-primary)"
          class="hub-pulse"
        />
        <circle
          [attr.cx]="merkezHub.x"
          [attr.cy]="merkezHub.y"
          r="8"
          fill="var(--color-primary-dark)"
        />
        <text
          [attr.x]="merkezHub.x"
          [attr.y]="merkezHub.y - 18"
          text-anchor="middle"
          class="hub-label"
        >
          {{ merkezHub.ad }}
        </text>
      </g>

      <!-- Bölge Düğümleri -->
      <g
        *ngFor="let node of bolgeDugumleri()"
        [class.node-group]="true"
        [class.node-group--active]="node.aktifMi"
        [class.node-group--selected]="seciliBolge === node.id"
        (click)="node.aktifMi && dugumSec(node.id)"
      >
        <!-- Geniş tıklama alanı (Kullanılabilirlik kolaylığı için görünmez geniş daire) -->
        <circle
          *ngIf="node.aktifMi"
          [attr.cx]="node.x"
          [attr.cy]="node.y"
          r="26"
          fill="transparent"
          style="cursor: pointer;"
        />

        <!-- Seçilmişlik halkası -->
        <circle
          *ngIf="seciliBolge === node.id"
          [attr.cx]="node.x"
          [attr.cy]="node.y"
          r="18"
          fill="none"
          [attr.stroke]="node.color"
          stroke-width="1.5"
          class="selected-glow"
        />

        <circle
          [attr.cx]="node.x"
          [attr.cy]="node.y"
          r="9"
          [attr.fill]="node.aktifMi ? node.color : '#e2e8f0'"
          class="node-circle"
        />

        <!-- Bölge Etiketleri ve İstatistikleri -->
        <text
          [attr.x]="node.x"
          [attr.y]="node.y - 14"
          text-anchor="middle"
          class="node-label"
          [class.node-label--inactive]="!node.aktifMi"
        >
          {{ node.ad }}
        </text>

        <text
          [attr.x]="node.x"
          [attr.y]="node.y + 20"
          text-anchor="middle"
          class="node-sub"
          *ngIf="node.aktifMi"
        >
          Kargo: {{ node.gonderiSayisi }} | Kurye: {{ node.kuryeSayisi }}
        </text>
        <text
          [attr.x]="node.x"
          [attr.y]="node.y + 20"
          text-anchor="middle"
          class="node-sub node-sub--inactive"
          *ngIf="!node.aktifMi"
        >
          Pasif
        </text>
      </g>
    </svg>
  </div>
</div>
